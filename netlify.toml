[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' https://www.paypal.com https://www.paypalobjects.com; frame-src https://www.paypal.com; connect-src 'self' https://www.paypal.com; form-action 'self'; base-uri 'self'; object-src 'none'"

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/english"
  to = "/en/"
  status = 301
